# Cloudflare Pages Configuration

[build]
  command = "npm run build"
  destination = "dist/public"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
