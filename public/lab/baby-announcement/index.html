<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Player 4 Has Entered the Game</title>
  <meta name="description" content="A special announcement from the Lumley family" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pixel: 'Press Start 2P', monospace;
      --bg-dark: #0a2f87;
      --bg-mid: #1b63e7;
      --gold: #ffd64d;
      --white: #ffffff;
      --shadow: #14337d;
    }
    body {
      min-height: 100vh;
      font-family: var(--pixel);
      background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 55%, #66d2ff 100%);
      color: var(--white);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px;
    }
    #entry {
      z-index: 2;
      background: radial-gradient(circle at center, rgba(46,114,255,.18), transparent 45%), linear-gradient(180deg, #051d57 0%, #0a2f87 100%);
      transition: opacity .45s ease;
      text-align: center;
      cursor: pointer;
    }
    #entry.hidden { opacity: 0; pointer-events: none; }
    .hearts { display: flex; gap: 12px; margin-bottom: 28px; font-size: clamp(20px, 5vw, 34px); }
    .title {
      color: var(--gold);
      text-shadow: 4px 4px 0 #9d7600, 8px 8px 0 rgba(0,0,0,.25);
      line-height: 1.4;
      text-align: center;
      margin-bottom: 28px;
      font-size: clamp(16px, 3vw, 30px);
      max-width: 900px;
    }
    .cta { font-size: clamp(12px, 2vw, 18px); animation: blink 1.1s steps(1) infinite; }
    .loading { display:none; text-align:center; }
    .loading.show { display:block; }
    .loading-bar {
      width: min(70vw, 420px);
      height: 22px;
      border: 4px solid white;
      background: rgba(255,255,255,.12);
      margin-top: 18px;
      box-shadow: 0 0 0 4px rgba(0,0,0,.15);
      overflow: hidden;
    }
    .loading-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #ffd64d 0%, #fff49c 100%);
      animation: load 1.2s ease forwards;
    }
    #card {
      opacity: 0;
      pointer-events: none;
      background: linear-gradient(180deg, #0f3db7 0%, #2691ff 50%, #70c9ff 100%);
      padding: 12px;
      transition: opacity .35s ease;
    }
    #card.show { opacity: 1; pointer-events: auto; }
    #card img {
      display: block;
      width: min(100%, 820px);
      max-height: calc(100vh - 24px);
      object-fit: contain;
      margin: 0 auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 12px 0 #0b2460, 0 24px 40px rgba(0,0,0,.28);
    }
    @keyframes blink { 50% { opacity: .35; } }
    @keyframes load { from { width: 0; } to { width: 100%; } }
    @media (max-width: 640px) {
      #card { padding: 0; }
      #card img { width: 100%; max-height: 100vh; box-shadow: none; }
      .title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <section id="entry" class="screen">
    <div class="hearts"><span>🧡</span><span>🧡</span><span>🧡</span></div>
    <h1 class="title">PLAYER 4 HAS ENTERED THE GAME</h1>
    <div id="cta" class="cta">TAP TO ENTER</div>
    <div id="loading" class="loading">
      <div>LOADING...</div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
  </section>

  <section id="card" class="screen" aria-live="polite">
    <img src="./announcement-v2.jpg" alt="Lumley family pixel-art baby announcement" />
  </section>

  <script>
    const entry = document.getElementById('entry');
    const card = document.getElementById('card');
    const cta = document.getElementById('cta');
    const loading = document.getElementById('loading');
    let started = false;
    function start() {
      if (started) return;
      started = true;
      cta.style.display = 'none';
      loading.classList.add('show');
      setTimeout(() => {
        entry.classList.add('hidden');
        card.classList.add('show');
      }, 1350);
    }
    entry.addEventListener('click', start);
    entry.addEventListener('touchstart', start, { passive: true });
  </script>
</body>
</html>
