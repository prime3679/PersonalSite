<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Player 4 Has Entered the Game</title>
  <meta name="description" content="A special announcement from the Lumley family">

  <!-- OG / Social -->
  <meta property="og:title" content="Player 4 Has Entered the Game">
  <meta property="og:description" content="A special announcement from the Lumley family">
  <meta property="og:image" content="./screen3.png">
  <meta property="og:type" content="website">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #3BA8F5;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Screen (shared) ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s ease;
    }
    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Full-bleed responsive image ── */
    .screen img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /*
      Landscape images (screens 1 & 2): 1600x669 ≈ 2.39:1
      On portrait phones the width is the constraint → fill width.
      On landscape/desktop the height is the constraint → fill height.
    */
    .screen--landscape img {
      width: 100vw;
      height: auto;
    }
    @media (min-aspect-ratio: 24/10) {
      .screen--landscape img {
        width: auto;
        height: 100vh;
      }
    }

    /*
      Portrait image (screen 3): 768x1376 ≈ 0.558:1
      On portrait phones the height is the constraint → fill height.
      On landscape/desktop the height is still usually the constraint.
    */
    .screen--portrait img {
      height: 100vh;
      height: 100dvh;
      width: auto;
    }
    /* Very narrow portrait where width becomes the constraint */
    @media (max-aspect-ratio: 56/100) {
      .screen--portrait img {
        width: 100vw;
        height: auto;
      }
    }

    /* ── Tap cursor on entry screen ── */
    #screen1 { cursor: pointer; }
  </style>
</head>
<body>
  <!-- Screen 1: Title / Tap to enter -->
  <section id="screen1" class="screen screen--landscape active">
    <img src="./screen1.png" alt="Player 4 Has Entered the Game - Tap to Enter" draggable="false">
  </section>

  <!-- Screen 2: Loading bar -->
  <section id="screen2" class="screen screen--landscape">
    <img src="./screen2.png" alt="Loading..." draggable="false">
  </section>

  <!-- Screen 3: The reveal -->
  <section id="screen3" class="screen screen--portrait" aria-live="polite">
    <img src="./screen3.png" alt="It's a Boy! Lumley family baby announcement" draggable="false">
  </section>

  <script>
    const s1 = document.getElementById('screen1');
    const s2 = document.getElementById('screen2');
    const s3 = document.getElementById('screen3');
    let started = false;

    // Preload screen 2 & 3 images
    new Image().src = './screen2.png';
    new Image().src = './screen3.png';

    function go() {
      if (started) return;
      started = true;

      // → Screen 2 (loading)
      s1.classList.remove('active');
      s2.classList.add('active');

      // → Screen 3 (reveal) after loading duration
      setTimeout(() => {
        s2.classList.remove('active');
        s3.classList.add('active');
      }, 2000);
    }

    s1.addEventListener('click', go);
    s1.addEventListener('touchstart', go, { passive: true });
  </script>
</body>
</html>
