<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Player 4 Has Entered the Game</title>
  <meta name="description" content="A special announcement from the Lumley family">
  <meta property="og:title" content="Player 4 Has Entered the Game">
  <meta property="og:description" content="A special announcement from the Lumley family">
  <meta property="og:image" content="./screen3.png">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #4AB8FF;
      -webkit-tap-highlight-color: transparent;
    }

    /*
      Each screen is a full-viewport layer.
      Only ONE is visible at a time — no opacity fading that
      causes bleedthrough. We use a quick JS class swap.
    */
    .screen {
      position: fixed;
      inset: 0;
      display: none;            /* fully removed from rendering */
      align-items: center;
      justify-content: center;
      z-index: 0;
    }
    .screen.active {
      display: flex;
      z-index: 10;
    }

    /* ─── Screen 1: Title (landscape image, centered) ─── */
    #screen1 {
      background: #4AB8FF;
      cursor: pointer;
      flex-direction: column;
    }
    #screen1 img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 100vh;
      max-height: 100dvh;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ─── Screen 2: Loading (landscape image, centered) ─── */
    #screen2 {
      background: #4AB8FF;
      flex-direction: column;
    }
    #screen2 img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 100vh;
      max-height: 100dvh;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ─── Screen 3: Reveal (portrait image) ─── */
    #screen3 {
      background: #4AB8FF;
    }
    #screen3 img {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Default: height is the constraint */
    #screen3 img {
      height: 100vh;
      height: 100dvh;
      width: auto;
    }
    /* Very narrow phones where width is the constraint (image aspect ≈ 0.558) */
    @media (max-aspect-ratio: 56/100) {
      #screen3 img {
        width: 100vw;
        height: auto;
      }
    }

    /* ─── Fade-in animation for the reveal ─── */
    @keyframes revealIn {
      from { opacity: 0; transform: scale(.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    #screen3.active img {
      animation: revealIn .45s cubic-bezier(.2,.8,.3,1) both;
    }
  </style>
</head>
<body>

  <!-- Screen 1: tap to enter — the image itself contains all the text -->
  <section id="screen1" class="screen active">
    <img src="./screen1.png" alt="Player 4 Has Entered the Game — Tap to Enter" draggable="false">
  </section>

  <!-- Screen 2: loading — the image itself contains loading bar + text -->
  <section id="screen2" class="screen">
    <img src="./screen2.png" alt="Loading..." draggable="false">
  </section>

  <!-- Screen 3: the big reveal -->
  <section id="screen3" class="screen" aria-live="polite">
    <img src="./screen3.png" alt="It's a Boy! Lumley family baby announcement" draggable="false">
  </section>

  <script>
    const s1 = document.getElementById('screen1');
    const s2 = document.getElementById('screen2');
    const s3 = document.getElementById('screen3');
    let started = false;

    // Preload so transitions are instant
    const preload2 = new Image(); preload2.src = './screen2.png';
    const preload3 = new Image(); preload3.src = './screen3.png';

    function show(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function go() {
      if (started) return;
      started = true;

      // Screen 1 → Screen 2 (loading)
      show(s2);

      // Screen 2 → Screen 3 (reveal) after a beat
      setTimeout(() => show(s3), 2000);
    }

    s1.addEventListener('click', go);
    s1.addEventListener('touchstart', go, { passive: true });
  </script>
</body>
</html>
