<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Player 4 Has Entered the Game</title>
  <meta name="description" content="A special announcement from the Lumley family">
  <meta property="og:title" content="Player 4 Has Entered the Game">
  <meta property="og:description" content="A special announcement from the Lumley family">
  <meta property="og:image" content="./screen3.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pixel: 'Press Start 2P', monospace;
      --bg-dark: #051d57;
      --bg-mid: #0a2f87;
      --bg-light: #1b63e7;
      --gold: #ffd64d;
      --gold-dark: #9d7600;
      --white: #ffffff;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: var(--pixel);
      background: var(--bg-dark);
      color: var(--white);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════════════════════════════
       SCREEN LAYER
       ═══════════════════════════════════ */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* ═══════════════════════════════════
       ENTRY SCREEN — dark retro title
       ═══════════════════════════════════ */
    #entry {
      z-index: 2;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(46,114,255,.15) 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
      text-align: center;
      cursor: pointer;
      padding: 24px;
      transition: opacity .5s ease;
    }
    #entry.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Hearts */
    .hearts {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: clamp(22px, 5vw, 36px);
    }
    .hearts span {
      display: inline-block;
      animation: pulse 1.4s ease infinite;
    }
    .hearts span:nth-child(2) { animation-delay: .12s; }
    .hearts span:nth-child(3) { animation-delay: .24s; }

    /* Title */
    .title {
      color: var(--gold);
      font-size: clamp(18px, 4.5vw, 36px);
      line-height: 1.45;
      text-align: center;
      margin-bottom: 32px;
      text-shadow:
        4px 4px 0 var(--gold-dark),
        8px 8px 0 rgba(0,0,0,.25);
      max-width: 800px;
    }

    /* CTA / Loading toggle */
    .cta {
      font-size: clamp(11px, 2vw, 16px);
      animation: blink 1.1s steps(1) infinite;
    }

    .loading {
      display: none;
      text-align: center;
    }
    .loading.show { display: block; }

    .loading-label {
      font-size: clamp(11px, 2vw, 16px);
      margin-bottom: 16px;
    }

    .loading-bar {
      width: min(70vw, 420px);
      height: 22px;
      border: 4px solid var(--white);
      background: rgba(255,255,255,.1);
      margin: 0 auto;
      box-shadow: 0 0 0 4px rgba(0,0,0,.15);
      overflow: hidden;
    }

    .loading-fill {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, #fff49c 100%);
    }
    .loading-fill.go {
      animation: fillBar 1.3s ease forwards;
    }

    /* ═══════════════════════════════════
       CARD SCREEN — the reveal
       ═══════════════════════════════════ */
    #card {
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      background: linear-gradient(180deg, #0f3db7 0%, #2691ff 50%, #70c9ff 100%);
      padding: 12px;
      transition: opacity .4s ease;
    }
    #card.show {
      opacity: 1;
      pointer-events: auto;
    }

    #card img {
      display: block;
      margin: 0 auto;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow:
        0 8px 0 #0b2460,
        0 16px 32px rgba(0,0,0,.3);
    }

    /* Default: constrained by height */
    #card img {
      height: calc(100vh - 24px);
      height: calc(100dvh - 24px);
      width: auto;
      max-width: calc(100vw - 24px);
    }

    /* Mobile: let it fill edge-to-edge */
    @media (max-width: 640px) {
      #card { padding: 0; }
      #card img {
        width: 100vw;
        height: auto;
        max-height: 100vh;
        max-height: 100dvh;
        box-shadow: none;
      }
    }

    /* Very narrow phones (narrower than image aspect ratio) */
    @media (max-aspect-ratio: 56/100) {
      #card img {
        width: 100vw;
        height: auto;
        max-height: none;
      }
    }

    /* ═══════════════════════════════════
       RESPONSIVE — entry screen
       ═══════════════════════════════════ */
    @media (max-width: 400px) {
      .title { font-size: 16px; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .title {
        font-size: clamp(12px, 3.5vh, 22px);
        margin-bottom: 16px;
      }
      .hearts {
        font-size: clamp(16px, 4vh, 28px);
        margin-bottom: 12px;
      }
    }

    /* ═══════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════ */
    @keyframes blink {
      50% { opacity: .3; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    @keyframes fillBar {
      0%   { width: 0; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ─── Entry Screen ─── -->
  <section id="entry" class="screen">
    <div class="hearts">
      <span>🧡</span><span>🧡</span><span>🧡</span>
    </div>
    <h1 class="title">PLAYER 4 HAS ENTERED THE GAME</h1>
    <div id="cta" class="cta">TAP TO ENTER</div>
    <div id="loading" class="loading">
      <div class="loading-label">LOADING...</div>
      <div class="loading-bar">
        <div id="loadFill" class="loading-fill"></div>
      </div>
    </div>
  </section>

  <!-- ─── Reveal Card ─── -->
  <section id="card" class="screen" aria-live="polite">
    <img src="./screen3.png" alt="It's a Boy! Lumley family baby announcement">
  </section>

  <script>
    const entry   = document.getElementById('entry');
    const card    = document.getElementById('card');
    const cta     = document.getElementById('cta');
    const loading = document.getElementById('loading');
    const fill    = document.getElementById('loadFill');
    let started = false;

    // Preload reveal image
    new Image().src = './screen3.png';

    function start() {
      if (started) return;
      started = true;

      // Hide CTA, show loading bar
      cta.style.display = 'none';
      loading.classList.add('show');
      requestAnimationFrame(() => fill.classList.add('go'));

      // After bar fills → reveal
      setTimeout(() => {
        entry.classList.add('hidden');
        card.classList.add('show');
      }, 1500);
    }

    entry.addEventListener('click', start);
    entry.addEventListener('touchstart', start, { passive: true });
  </script>
</body>
</html>
