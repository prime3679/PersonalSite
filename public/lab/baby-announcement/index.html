<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player 4 Has Entered the Game!</title>
  <meta name="description" content="A special announcement from the Lumley family" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0f3db7 0%, #2691ff 50%, #70c9ff 100%);
      padding: 12px;
    }
    img {
      display: block;
      width: min(100%, 820px);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 12px 0 #0b2460, 0 24px 40px rgba(0,0,0,.28);
    }
    @media (max-width: 640px) {
      body { padding: 0; }
      img { width: 100%; box-shadow: none; }
    }
  </style>
</head>
<body>
  <img src="./announcement.png" alt="Lumley family baby announcement in pixel art" />
</body>
</html>
