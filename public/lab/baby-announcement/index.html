<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Player 4 Has Entered the Game!</title>
<meta name="description" content="A special announcement from the Lumley family">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue-dark: #0a0e27;
    --blue-mid: #1a237e;
    --blue-bright: #2962ff;
    --blue-sky: #42a5f5;
    --gold: #ffd600;
    --gold-dark: #f9a825;
    --white: #ffffff;
    --green: #4caf50;
    --red: #e53935;
    --pink: #f06292;
    --pixel: 'Press Start 2P', monospace;
  }

  body {
    background: var(--blue-dark);
    font-family: var(--pixel);
    overflow: hidden;
    width: 100vw;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── Start Screen ── */
  #start-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--blue-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.5s;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }

  .start-title {
    font-size: clamp(10px, 3vw, 20px);
    color: var(--gold);
    text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,214,0,0.3);
    text-align: center;
    line-height: 2;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease forwards;
  }

  .press-start {
    font-size: clamp(8px, 2.5vw, 14px);
    color: var(--white);
    animation: blink 1s step-end infinite;
  }

  .start-hearts {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeSlideUp 0.8s 0.3s ease forwards;
  }
  .start-hearts span {
    font-size: clamp(16px, 4vw, 28px);
  }

  /* ── Main Scene ── */
  #scene {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    gap: clamp(8px, 2vh, 20px);
  }
  #scene.active { opacity: 1; }

  /* Header */
  .header-text {
    text-align: center;
    opacity: 0;
    transform: translateY(-30px);
  }
  .header-text.show {
    animation: dropIn 0.6s ease forwards;
  }
  .header-line1 {
    font-size: clamp(14px, 4.5vw, 24px);
    color: var(--gold);
    text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,214,0,0.4);
    line-height: 1.4;
  }
  .header-line2 {
    font-size: clamp(10px, 3vw, 16px);
    color: var(--gold);
    text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,214,0,0.4);
    line-height: 1.4;
  }

  .header-hearts {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 4px;
    opacity: 0;
  }
  .header-hearts.show { animation: fadeIn 0.4s ease forwards; }
  .header-hearts span {
    color: var(--red);
    font-size: clamp(10px, 2.5vw, 16px);
    filter: drop-shadow(1px 1px 0 #000);
  }

  /* Game Scene Box */
  .game-scene {
    width: 100%;
    background: linear-gradient(180deg, #42a5f5 0%, #90caf9 40%, #4caf50 70%, #388e3c 100%);
    border: 4px solid #1a237e;
    border-radius: 12px;
    padding: clamp(12px, 3vh, 24px) 16px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.9);
    box-shadow: 0 0 30px rgba(41,98,255,0.3), inset 0 0 30px rgba(255,255,255,0.1);
  }
  .game-scene.show {
    animation: scaleIn 0.5s ease forwards;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    filter: blur(1px);
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 {
    width: 40px; height: 18px; top: 12%; left: -50px;
    animation: cloudMove 20s linear infinite;
  }
  .cloud-1::before { width: 22px; height: 22px; top: -10px; left: 8px; }
  .cloud-1::after { width: 16px; height: 16px; top: -6px; left: 22px; }
  .cloud-2 {
    width: 50px; height: 20px; top: 8%; left: -60px;
    animation: cloudMove 25s 8s linear infinite;
  }
  .cloud-2::before { width: 28px; height: 28px; top: -14px; left: 10px; }
  .cloud-2::after { width: 20px; height: 20px; top: -8px; left: 28px; }
  .cloud-3 {
    width: 35px; height: 14px; top: 18%; left: -45px;
    animation: cloudMove 18s 4s linear infinite;
  }
  .cloud-3::before { width: 18px; height: 18px; top: -8px; left: 6px; }
  .cloud-3::after { width: 14px; height: 14px; top: -5px; left: 18px; }

  /* Characters */
  .characters {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(6px, 2vw, 16px);
    position: relative;
    z-index: 2;
    min-height: clamp(100px, 20vh, 180px);
  }

  .character {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transform: translateY(20px);
  }
  .character.show {
    animation: bounceIn 0.5s ease forwards;
  }
  .character:nth-child(2).show { animation-delay: 0.15s; }
  .character:nth-child(3).show { animation-delay: 0.3s; }

  .char-sprite {
    font-size: clamp(48px, 10vw, 80px);
    filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.3));
    line-height: 1;
  }
  .char-sprite.child-sprite {
    font-size: clamp(36px, 8vw, 60px);
  }

  .char-label {
    font-size: clamp(6px, 1.5vw, 8px);
    color: var(--white);
    text-shadow: 1px 1px 0 #000;
    margin-top: 4px;
    text-align: center;
  }

  /* Sparkle around child */
  .sparkle-wrap {
    position: relative;
  }
  .sparkle-wrap::before {
    content: '';
    font-size: clamp(12px, 3vw, 18px);
    position: absolute;
    top: -8px;
    right: -8px;
    animation: twinkle 1.5s ease-in-out infinite;
  }

  /* Big Announcement */
  .announcement {
    text-align: center;
    opacity: 0;
    transform: scale(0);
  }
  .announcement.show {
    animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
  }

  .its-a-boy {
    font-size: clamp(24px, 8vw, 48px);
    color: var(--white);
    text-shadow:
      4px 4px 0 var(--blue-mid),
      -2px -2px 0 var(--blue-mid),
      2px -2px 0 var(--blue-mid),
      -2px 2px 0 var(--blue-mid),
      0 0 30px rgba(41,98,255,0.5);
    letter-spacing: 2px;
    line-height: 1.3;
  }

  /* Info Panel */
  .info-panel {
    width: 100%;
    background: rgba(10, 14, 39, 0.9);
    border: 3px solid var(--blue-bright);
    border-radius: 10px;
    padding: clamp(10px, 2vh, 16px);
    opacity: 0;
    transform: translateY(20px);
    box-shadow: 0 0 20px rgba(41,98,255,0.3), inset 0 0 15px rgba(41,98,255,0.1);
  }
  .info-panel.show {
    animation: slideUp 0.5s ease forwards;
  }

  .info-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 8px;
  }

  .info-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 6px 10px;
    flex: 1;
  }

  .info-icon {
    font-size: clamp(14px, 3vw, 20px);
  }

  .info-text {
    display: flex;
    flex-direction: column;
  }
  .info-label {
    font-size: clamp(5px, 1.2vw, 7px);
    color: var(--blue-sky);
    line-height: 1.4;
  }
  .info-value {
    font-size: clamp(7px, 1.8vw, 10px);
    color: var(--white);
    line-height: 1.4;
  }
  .info-value.gold { color: var(--gold); }

  /* Loading Bar */
  .loading-bar-wrap {
    width: 100%;
    margin-top: 8px;
  }
  .loading-label {
    font-size: clamp(5px, 1.2vw, 7px);
    color: var(--blue-sky);
    margin-bottom: 4px;
    text-align: center;
  }
  .loading-bar {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .loading-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-bright), var(--blue-sky), var(--green));
    border-radius: 4px;
    width: 0%;
    transition: width 2s ease-out;
    position: relative;
  }
  .loading-fill.animate {
    width: var(--progress);
  }
  .loading-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    animation: shimmer 2s infinite;
  }

  /* Stats Bar */
  .stats-bar {
    width: 100%;
    display: flex;
    justify-content: space-around;
    gap: 6px;
    opacity: 0;
    transform: translateY(20px);
  }
  .stats-bar.show {
    animation: slideUp 0.5s ease forwards;
  }

  .stat-card {
    flex: 1;
    background: rgba(10, 14, 39, 0.85);
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    padding: clamp(6px, 1.5vh, 12px) 4px;
    text-align: center;
    box-shadow: 0 0 10px rgba(255,214,0,0.15);
  }

  .stat-icon {
    font-size: clamp(14px, 3vw, 22px);
    margin-bottom: 2px;
  }

  .stat-name {
    font-size: clamp(6px, 1.5vw, 9px);
    color: var(--white);
    text-shadow: 1px 1px 0 #000;
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: clamp(6px, 1.3vw, 8px);
    color: var(--gold);
    text-shadow: 1px 1px 0 #000;
  }

  /* Floating Items */
  .floating-items {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
  }

  .float-item {
    position: absolute;
    font-size: clamp(16px, 3vw, 24px);
    opacity: 0;
    animation: floatUp 3s ease-out forwards;
  }

  /* Confetti */
  .confetti-container {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: confettiFall linear forwards;
  }

  /* ── Animations ── */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes fadeSlideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes dropIn {
    0% { opacity: 0; transform: translateY(-30px); }
    60% { transform: translateY(5px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    0% { opacity: 0; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes bounceIn {
    0% { opacity: 0; transform: translateY(20px); }
    50% { opacity: 1; transform: translateY(-10px); }
    70% { transform: translateY(3px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0); }
    70% { opacity: 1; transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes cloudMove {
    from { left: -80px; }
    to { left: 110%; }
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-200px) rotate(360deg); }
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .bounce-gentle {
    animation: gentleBounce 2s ease-in-out infinite;
  }

  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }

  /* Scanlines overlay */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }
</style>
</head>
<body>

<!-- CRT Scanlines -->
<div class="scanlines"></div>

<!-- Background Canvas (stars) -->
<canvas id="bg"></canvas>

<!-- Start Screen -->
<div id="start-screen">
  <div class="start-hearts">
    <span>&#x2764;&#xFE0F;</span>
    <span>&#x2764;&#xFE0F;</span>
    <span>&#x2764;&#xFE0F;</span>
  </div>
  <div class="start-title">
    PLAYER 4<br>HAS ENTERED<br>THE GAME!
  </div>
  <div class="press-start">&#x2013; PRESS START &#x2013;</div>
</div>

<!-- Floating Items Container -->
<div class="floating-items" id="floatingItems"></div>

<!-- Confetti Container -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- Main Scene -->
<div id="scene">

  <!-- Header -->
  <div class="header-text" id="header">
    <div class="header-line1">PLAYER 4</div>
    <div class="header-line2">HAS ENTERED THE GAME!</div>
    <div class="header-hearts" id="headerHearts">
      <span>&#x2764;&#xFE0F;</span>
      <span>&#x2764;&#xFE0F;</span>
      <span>&#x2764;&#xFE0F;</span>
    </div>
  </div>

  <!-- Game Scene -->
  <div class="game-scene" id="gameScene">
    <!-- Clouds -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- Characters -->
    <div class="characters">
      <div class="character" id="char1">
        <div class="char-sprite">&#x1F9D1;&#x200D;&#x1F4BB;</div>
        <div class="char-label">DAD</div>
      </div>
      <div class="character" id="char2">
        <div class="sparkle-wrap">
          <div class="char-sprite child-sprite">&#x1F467;</div>
        </div>
        <div class="char-label">BIG SIS</div>
      </div>
      <div class="character" id="char3">
        <div class="char-sprite">&#x1F469;</div>
        <div class="char-label">MOM</div>
      </div>
    </div>

    <!-- Announcement -->
    <div class="announcement" id="announcement">
      <div class="its-a-boy">IT'S A BOY!</div>
    </div>
  </div>

  <!-- Info Panel -->
  <div class="info-panel" id="infoPanel">
    <div class="info-row">
      <div class="info-box">
        <div class="info-icon">&#x1F6CB;</div>
        <div class="info-text">
          <span class="info-label">BABY</span>
          <span class="info-value">LOADING...</span>
        </div>
      </div>
      <div class="info-box">
        <div class="info-icon">&#x1F4C5;</div>
        <div class="info-text">
          <span class="info-label">DUE DATE</span>
          <span class="info-value gold">10/8!</span>
        </div>
      </div>
    </div>
    <div class="loading-bar-wrap">
      <div class="loading-label">PROGRESS</div>
      <div class="loading-bar">
        <div class="loading-fill" id="loadingFill"></div>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-icon">&#x2B50;</div>
      <div class="stat-name">NICOLE</div>
      <div class="stat-value">XP 1000</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">&#x2764;&#xFE0F;</div>
      <div class="stat-name">EVIE</div>
      <div class="stat-value">LVL 3</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">&#x1F3CB;&#xFE0F;</div>
      <div class="stat-name">DAD</div>
      <div class="stat-value">XP +</div>
    </div>
  </div>

</div>

<script>
// ── Starfield Background ──
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.3 + 0.1,
      brightness: Math.random()
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.brightness += (Math.random() - 0.5) * 0.05;
    s.brightness = Math.max(0.2, Math.min(1, s.brightness));
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness * 0.6})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

resizeCanvas();
initStars();
drawStars();
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// ── Confetti ──
function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#ffd600', '#2962ff', '#e53935', '#4caf50', '#f06292', '#42a5f5', '#ff9800', '#ab47bc'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.classList.add('confetti');
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 8 + 4) + 'px';
    el.style.height = (Math.random() * 8 + 4) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
    el.style.animationDelay = (Math.random() * 1.5) + 's';
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ''; }, 5000);
}

// ── Floating Items ──
function spawnFloatingItems() {
  const container = document.getElementById('floatingItems');
  const items = ['\uD83C\uDF7C', '\uD83D\uDC76', '\u2B50', '\uD83C\uDF1F', '\uD83D\uDC99', '\uD83C\uDF89', '\uD83C\uDF80', '\uD83D\uDC63'];
  let idx = 0;
  function spawn() {
    if (idx > 20) return;
    const el = document.createElement('div');
    el.classList.add('float-item');
    el.textContent = items[Math.floor(Math.random() * items.length)];
    el.style.left = (Math.random() * 80 + 10) + '%';
    el.style.bottom = '5%';
    el.style.animationDelay = '0s';
    container.appendChild(el);
    idx++;
    setTimeout(() => el.remove(), 3500);
  }
  // Spawn a burst, then periodically
  for (let i = 0; i < 6; i++) setTimeout(spawn, i * 200);
  setInterval(spawn, 2000);
}

// ── Loading Bar Progress ──
function calcProgress() {
  // Due date: Oct 8 of the current or next year
  // Assume ~40 weeks pregnancy. Approximate conception ~Jan 1 for Oct 8 due.
  // We'll calculate based on a ~40 week window ending Oct 8
  const now = new Date();
  let dueYear = now.getFullYear();
  const due = new Date(dueYear, 9, 8); // Oct 8
  // ~40 weeks = 280 days before due
  const conceptionApprox = new Date(due.getTime() - 280 * 24 * 60 * 60 * 1000);
  const total = due.getTime() - conceptionApprox.getTime();
  const elapsed = now.getTime() - conceptionApprox.getTime();
  const pct = Math.max(0, Math.min(100, (elapsed / total) * 100));
  return Math.round(pct);
}

// ── Sound Effects (Web Audio) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playTone(freq, duration, type, volume) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume || 0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playCoinSound() {
  playTone(988, 0.08, 'square', 0.06);
  setTimeout(() => playTone(1319, 0.15, 'square', 0.06), 80);
}

function playPowerUp() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.12, 'square', 0.05), i * 100));
}

function playStartSound() {
  const notes = [262, 330, 392, 523, 659, 784];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.15, 'square', 0.06), i * 80));
}

function playRevealSound() {
  const notes = [392, 494, 587, 784, 988, 1175];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.18, 'triangle', 0.07), i * 100));
}

// ── Animation Sequence ──
function runSequence() {
  const scene = document.getElementById('scene');
  const header = document.getElementById('header');
  const headerHearts = document.getElementById('headerHearts');
  const gameScene = document.getElementById('gameScene');
  const chars = [document.getElementById('char1'), document.getElementById('char2'), document.getElementById('char3')];
  const announcement = document.getElementById('announcement');
  const infoPanel = document.getElementById('infoPanel');
  const statsBar = document.getElementById('statsBar');
  const loadingFill = document.getElementById('loadingFill');

  scene.classList.add('active');

  // Step 1: Header drops in
  setTimeout(() => {
    header.classList.add('show');
    playCoinSound();
  }, 300);

  // Step 2: Hearts appear
  setTimeout(() => {
    headerHearts.classList.add('show');
  }, 900);

  // Step 3: Game scene scales in
  setTimeout(() => {
    gameScene.classList.add('show');
    playPowerUp();
  }, 1200);

  // Step 4: Characters bounce in
  setTimeout(() => {
    chars.forEach(c => c.classList.add('show'));
    playCoinSound();
  }, 1800);

  // Add gentle bounce to characters after they appear
  setTimeout(() => {
    chars.forEach((c, i) => {
      c.style.animationDelay = (i * 0.3) + 's';
      c.classList.add('bounce-gentle');
    });
  }, 2800);

  // Step 5: IT'S A BOY!
  setTimeout(() => {
    announcement.classList.add('show');
    playRevealSound();
    spawnConfetti();
    spawnFloatingItems();
  }, 2800);

  // Make announcement pulse after pop-in
  setTimeout(() => {
    announcement.classList.add('pulse');
  }, 3600);

  // Step 6: Info panel
  setTimeout(() => {
    infoPanel.classList.add('show');
    playCoinSound();
  }, 3800);

  // Step 7: Loading bar
  setTimeout(() => {
    const progress = calcProgress();
    loadingFill.style.setProperty('--progress', progress + '%');
    loadingFill.classList.add('animate');
  }, 4200);

  // Step 8: Stats bar
  setTimeout(() => {
    statsBar.classList.add('show');
    playStartSound();
  }, 4800);

  // Periodic confetti bursts
  setInterval(spawnConfetti, 12000);
}

// ── Start ──
document.getElementById('start-screen').addEventListener('click', function() {
  audioCtx = new AudioCtx();
  playStartSound();
  this.classList.add('hidden');
  setTimeout(runSequence, 600);
});

// Also handle keyboard
document.addEventListener('keydown', function handler(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    document.getElementById('start-screen').click();
    document.removeEventListener('keydown', handler);
  }
});
</script>
